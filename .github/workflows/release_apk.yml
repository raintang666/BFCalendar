name: Release Demo APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and upload APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare release asset
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/calendarview_flutter_demo.apk

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_NAME="${INPUT_TAG_NAME:-$REF_NAME}"
          if [[ "$TAG_NAME" != v* ]]; then
            echo "Release tag must start with v, got: $TAG_NAME"
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release/calendarview_flutter_demo.apk --clobber
          else
            gh release create "$TAG_NAME" release/calendarview_flutter_demo.apk \
              --title "$TAG_NAME" \
              --notes "CalendarView Flutter demo APK." \
              --latest
          fi
